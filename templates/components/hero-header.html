<section id="home" class="breadcrumb-section {{ hero_header_class|default('') }}">
  <div class="container">
    <div class="row justify-content-center align-items-center">
      <div class="col-12">
        <div class="content w-60 animate-hero">
          <h1 class="title reveal-text">{{ title_line_1 }}</h1>
          <div class="flex ms-auto">
            {% if show_line %}<span class="line animate-line"></span>{% endif %}
            <h1 class="title reveal-text animate-bottom">{{ title_line_2 }}</h1>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="content-round {{ hero_round_class|default('') }}">
  <div class="rounded-div-wrapper">
    <div class="rounded-div">
      <div class="rounded-div-background"></div>
    </div>
  </div>
</div>
