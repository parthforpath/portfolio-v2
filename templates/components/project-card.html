<div class="stack-item">
  <div class="card portfolio-item layout-2 scale has-shadow animate-bottom">
    <div class="image-holder">
      <a class="card-thumb magnetic-button" href="{{ url_for('project_detail', slug=project.slug) }}">
        <img src="{{ url_for('static', filename=project.thumbnail) }}" alt="{{ project.title }}" loading="lazy">
      </a>
      <div class="card-overlay">
        <div class="heading">
          <h4 class="title reveal-text mt-2 mt-md-3 mb-3">{{ project.title }}</h4>
          <div class="show-project">
            <div class="card-terms">
              {% for tech in project.technologies[:2] %}<a class="terms badge outlined" href="#">{{ tech }}</a>{% endfor %}
            </div>
            <div class="project-link"><a class="swap-icon" href="{{ url_for('project_detail', slug=project.slug) }}">Show Project</a></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
